<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>@khangloveios</title>

<style>
:root{
--menu-width:400px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:transparent;
overflow:hidden;
}

/* TAB */

#floatingTab{
width:85px;
height:85px;

border-radius:50%;
overflow:hidden;

position:fixed;
top:120px;
left:20px;

z-index:99999;

cursor:grab;

border:3px solid #5865F2;

box-shadow:
0 0 18px rgba(88,101,242,0.7),
0 0 40px rgba(88,101,242,0.4);

user-select:none;
}

#floatingTab img{
width:100%;
height:100%;
object-fit:cover;
}

/* MENU */

#mainMenu{
position:fixed;
top:220px;
left:20px;

z-index:9999;

display:none;
}

/* BORDER */

.menu-border{
padding:3px;

border-radius:30px;

background:linear-gradient(
135deg,
#5865F2,
#111,
#5865F2
);

background-size:300% 300%;

animation:borderGlow 5s linear infinite;

box-shadow:
0 0 18px rgba(88,101,242,0.4);
}

@keyframes borderGlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MENU */

.menu{
width:var(--menu-width);

border-radius:28px;

overflow:hidden;

color:white;

position:relative;

background:rgba(0,0,0,0.4);

backdrop-filter:blur(15px);
}

/* BG */

.background{
position:absolute;
inset:0;

background:url("https://hanaminikata.com/image/1502088830084190238/d651563a53a3247e.webp")
center/cover no-repeat;

filter:brightness(0.55);

z-index:0;
}

.overlay{
position:absolute;
inset:0;

background:rgba(0,0,0,0.45);

z-index:1;
}

/* CONTENT */

.tabs,
.tab-content,
label{
position:relative;
z-index:2;
}

/* TAB */

.tabs{
display:flex;

background:rgba(0,0,0,0.65);
}

.tabs button{
flex:1;

padding:14px;

border:none;

background:transparent;

color:#ddd;

font-size:16px;
font-weight:bold;

cursor:pointer;
}

.tabs button.active{
color:#00c3ff;

border-bottom:2px solid #00c3ff;
}

/* CONTENT */

.tab-content{
padding:18px;
display:none;
}

.tab-content.active{
display:block;
}

/* LABEL */

label{
display:flex;
align-items:center;

gap:10px;

margin:12px 0;

padding:12px 14px;

border-radius:16px;

background:rgba(255,255,255,0.05);

transition:0.2s;
}

label:hover{
background:rgba(255,255,255,0.1);
}

input[type="checkbox"]{
width:18px;
height:18px;
}

/* CLOSE */

.closeBtn{
position:absolute;

top:8px;
right:8px;

z-index:999;

width:32px;
height:32px;

border:none;
border-radius:50%;

background:red;

color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;
}

/* KEY */

#keyBox{
position:fixed;
inset:0;

z-index:999999;

display:flex;
align-items:center;
justify-content:center;

background:rgba(0,0,0,0.65);

backdrop-filter:blur(8px);
}

.key-container{
width:320px;

padding:24px;

border-radius:25px;

background:#111;

border:2px solid #5865F2;

text-align:center;

box-shadow:
0 0 25px rgba(88,101,242,0.5);
}

.key-container h1{
font-size:30px;
margin-bottom:10px;
color:white;
}

.key-container p{
color:#aaa;
margin-bottom:18px;
}

#keyInput{
width:100%;

height:50px;

border:none;
outline:none;

padding:0 15px;

border-radius:12px;

background:#1a1a1a;

color:white;

font-size:16px;

margin-bottom:15px;
}

.key-container button{
width:100%;

height:50px;

border:none;

border-radius:12px;

background:#5865F2;

color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;
}

#status{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

</div>
</div>
</div>

<script>

/* TAB */

const tabs=document.querySelectorAll(".tab-btn");
const contents=document.querySelectorAll(".tab-content");

tabs.forEach(btn=>{
btn.onclick=()=>{
tabs.forEach(b=>b.classList.remove("active"));
contents.forEach(c=>c.classList.remove("active"));

btn.classList.add("active");

document.getElementById(btn.dataset.tab)
.classList.add("active");
};
});

/* MENU */

const floatingTab=document.getElementById("floatingTab");
const mainMenu=document.getElementById("mainMenu");

function toggleMenu(){

if(mainMenu.style.display==="block"){

mainMenu.style.display="none";

}else{

mainMenu.style.display="block";

mainMenu.style.left=
floatingTab.offsetLeft+"px";

mainMenu.style.top=
(floatingTab.offsetTop+95)+"px";

}
}

floatingTab.addEventListener("click",toggleMenu);

/* DRAG */

let isDragging=false;
let offsetX,offsetY;

floatingTab.addEventListener("touchstart",(e)=>{

isDragging=true;

offsetX=
e.touches[0].clientX-floatingTab.offsetLeft;

offsetY=
e.touches[0].clientY-floatingTab.offsetTop;

});

document.addEventListener("touchmove",(e)=>{

if(!isDragging) return;

floatingTab.style.left=
(e.touches[0].clientX-offsetX)+"px";

floatingTab.style.top=
(e.touches[0].clientY-offsetY)+"px";

mainMenu.style.left=
floatingTab.offsetLeft+"px";

mainMenu.style.top=
(floatingTab.offsetTop+95)+"px";

});

document.addEventListener("touchend",()=>{
isDragging=false;
});

/* DISCORD KEY */

let validKeys=[];

async function loadKeys(){

try{

const res=await fetch("/keys");

validKeys=await res.json();

}catch(e){

console.log("Load key lỗi");

}

}

loadKeys();

/* CHECK KEY */

function checkKey(){

let input=
document.getElementById("keyInput").value;

if(validKeys.includes(input)){

document.getElementById("status").innerHTML=
"<span style='color:#00ff55;'>KEY HỢP LỆ</span>";

setTimeout(()=>{

document.getElementById("keyBox")
.style.display="none";

},700);

}else{

document.getElementById("status").innerHTML=
"<span style='color:red;'>KEY KHÔNG TỒN TẠI</span>";

}

}
