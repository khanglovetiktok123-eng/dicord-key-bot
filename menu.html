0 0 18px rgba(255,0,0,0.35),

@keyframes borderGlow{

50%{background-position:100% 50%;}

}

.overlay{

<script>
/* TAB */
const tabs=document.querySelectorAll(".tab-btn");
const contents=document.querySelectorAll(".tab-content");

tabs.forEach(btn=>{
btn.onclick=()=>{
tabs.forEach(b=>b.classList.remove("active"));
contents.forEach(c=>c.classList.remove("active"));

btn.classList.add("active");

document.getElementById(btn.dataset.tab)
.classList.add("active");
};
});

/* MENU */
const floatingTab=document.getElementById("floatingTab");
const mainMenu=document.getElementById("mainMenu");

function toggleMenu(){

if(mainMenu.style.display==="block"){
mainMenu.style.display="none";
}else{

mainMenu.style.display="block";

mainMenu.style.left=
floatingTab.offsetLeft+"px";

mainMenu.style.top=
(floatingTab.offsetTop+95)+"px";
}
}

floatingTab.addEventListener("click",toggleMenu);

/* DRAG */
let isDragging=false;
let offsetX,offsetY;

floatingTab.addEventListener("touchstart",(e)=>{
isDragging=true;

offsetX=
e.touches[0].clientX-floatingTab.offsetLeft;

offsetY=
e.touches[0].clientY-floatingTab.offsetTop;
});

document.addEventListener("touchmove",(e)=>{
if(!isDragging) return;

floatingTab.style.left=
(e.touches[0].clientX-offsetX)+"px";

floatingTab.style.top=
(e.touches[0].clientY-offsetY)+"px";

mainMenu.style.left=
floatingTab.offsetLeft+"px";

mainMenu.style.top=
(floatingTab.offsetTop+95)+"px";
});

document.addEventListener("touchend",()=>{
isDragging=false;
});

/* KEY */
const adKey="@khangloveios";
const freeKey="khangiosfree";

/* TIMER */
let countdown=30;

const timer=setInterval(()=>{

countdown--;

document.getElementById("status").innerHTML=
"<span style='color:#ff2b2b;'>"+countdown+"s</span>";

if(countdown<=0){

clearInterval(timer);

document.body.innerHTML="";

alert("Hết thời gian nhập key!");

window.close();
}

},1000);

/* CHECK */
function checkKey(){

let input=
document.getElementById("keyInput").value;

if(
input===adKey ||
input===freeKey
){

clearInterval(timer);

document.getElementById("status").innerHTML=
"<span style='color:#00ff55;'>Đăng nhập thành công</span>";

setTimeout(()=>{

document.getElementById("keyBox")
.style.display="none";

},800);

}else{

document.getElementById("status").innerHTML=
"<span style='color:#ff2b2b;'>Đăng nhập thất bại</span>";
}
}
