<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>@khangloveios</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#08122b;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* VIỀN 7 MÀU */

.rainbow-border{
    padding:4px;
    border-radius:28px;

    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );

    background-size:400% 400%;

    animation:rainbowMove 4s linear infinite;

    box-shadow:
    0 0 20px rgba(255,255,255,0.2),
    0 0 40px rgba(0,0,0,0.5);
}

@keyframes rainbowMove{
    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:400% 50%;
    }
}

/* PANEL */

.panel{
    width:340px;
    background:#050505;
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
}

/* TITLE */

.title{
    color:white;
    font-size:38px;
    font-weight:bold;
    margin-bottom:30px;

    text-shadow:
    0 0 10px rgba(255,255,255,0.3);
}

/* INPUT */

input{
    width:100%;
    height:55px;

    border:none;
    outline:none;

    border-radius:15px;

    background:#1b2946;

    color:white;

    font-size:18px;

    padding:0 15px;

    margin-bottom:20px;
}

input::placeholder{
    color:#8f9bb3;
}

/* BUTTON */

button{
    width:100%;
    height:55px;

    border:none;
    border-radius:15px;

    background:#003cff;

    color:white;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
    background:#1f57ff;
}

/* STATUS */

#status{
    margin-top:22px;
    color:#bdbdbd;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="rainbow-border">

    <div class="panel">

        <div class="title">
            @khangloveios
        </div>

        <input
        type="password"
        id="keyInput"
        placeholder="Nhập key admin">

        <button onclick="login()">
            ĐĂNG NHẬP
        </button>

        <div id="status">
            Waiting...
        </div>

    </div>

</div>

<script>

function login(){

    const key =
    document.getElementById("keyInput")
    .value;

    if(key === "nhat khang"){

        document.getElementById("status")
        .innerHTML =
        "<span style='color:#00ff66;'>✅ Đăng nhập thành công</span>";

        setTimeout(()=>{

            window.location.href =
            "https://khangloveios.com";

        },1000);

    }else{

        document.getElementById("status")
        .innerHTML =
        "<span style='color:red;'>❌ Sai key admin</span>";
    }
}

</script>

</body>
</html>
