<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>@khangloveios</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#08112b;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* VIỀN 7 MÀU */

.rainbow-border{
    padding:4px;
    border-radius:28px;

    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );

    background-size:400%;
    animation:rainbow 4s linear infinite;

    box-shadow:
    0 0 20px rgba(255,255,255,0.2),
    0 0 40px rgba(0,255,255,0.2);
}

@keyframes rainbow{
    0%{
        background-position:0%;
    }

    100%{
        background-position:400%;
    }
}

/* BOX */

.login-box{
    width:350px;
    background:#050505;
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
}

/* TITLE */

.login-box h1{
    color:white;
    font-size:48px;
    margin-bottom:35px;
    font-weight:bold;
}

/* INPUT */

input{
    width:100%;
    height:58px;

    border:none;
    outline:none;

    border-radius:16px;

    padding:0 18px;

    font-size:18px;

    background:#1e2a47;
    color:white;

    margin-bottom:22px;
}

input::placeholder{
    color:#8f9bb3;
}

/* BUTTON */

button{
    width:100%;
    height:58px;

    border:none;
    border-radius:16px;

    background:#003cff;

    color:white;
    font-size:28px;
    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
    background:#004dff;
}

/* STATUS */

#status{
    margin-top:25px;
    color:#9ca3af;
    font-size:22px;
    font-weight:bold;
}

/* PANEL */

#panel{
    display:none;
}

.panel-box{
    width:380px;
    background:#050505;
    border-radius:25px;
    padding:30px;
    text-align:center;
}

.panel-box h2{
    color:white;
    font-size:40px;
    margin-bottom:25px;
}

.menu-btn{
    width:100%;
    height:55px;
    margin-top:14px;

    border:none;
    border-radius:14px;

    color:white;
    font-size:22px;
    font-weight:bold;
}

/* BUTTON COLORS */

.create{
    background:#00c853;
}

.delete{
    background:#ff1744;
}

.check{
    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    );
}

.result{
    margin-top:20px;

    background:#111827;

    border-radius:14px;

    padding:18px;

    color:white;
    font-size:20px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="rainbow-border">

<div class="login-box">

<h1>@khangloveios</h1>

<input
type="password"
id="adminKey"
placeholder="Nhập key admin"
/>

<button onclick="login()">
ĐĂNG NHẬP
</button>

<div id="status">
Waiting...
</div>

</div>
</div>
</div>

<!-- PANEL -->

<div id="panel">

<div class="rainbow-border">

<div class="panel-box">

<h2>ADMIN PANEL</h2>

<input
type="text"
id="key"
placeholder="Nhập key"
/>

<button class="menu-btn create" onclick="createKey()">
CREATE KEY
</button>

<button class="menu-btn delete" onclick="deleteKey()">
DELETE KEY
</button>

<button class="menu-btn check" onclick="checkKey()">
CHECK KEY
</button>

<div class="result" id="result">
Kết quả sẽ hiện ở đây
</div>

</div>
</div>
</div>

<script>

const api = "https://dicord-key-bot.onrender.com";

/* LOGIN */

function login(){

    const key =
    document.getElementById("adminKey")
    .value;

    if(key === "nhat khang"){

        document.getElementById("status")
        .innerHTML =
        "✅ Đăng nhập thành công";

        setTimeout(()=>{

            document.getElementById("login")
            .style.display = "none";

            document.getElementById("panel")
            .style.display = "block";

        },800);

    }else{

        document.getElementById("status")
        .innerHTML =
        "❌ Sai key admin";
    }
}

/* CREATE KEY */

async function createKey(){

    const key =
    document.getElementById("key")
    .value;

    await fetch(`${api}/create/${key}`);

    document.getElementById("result")
    .innerHTML =
    "✅ Đã tạo key: " + key;
}

/* DELETE KEY */

async function deleteKey(){

    const key =
    document.getElementById("key")
    .value;

    await fetch(`${api}/delete/${key}`);

    document.getElementById("result")
    .innerHTML =
    "🗑️ Đã xóa key: " + key;
}

/* CHECK KEY */

async function checkKey(){

    const key =
    document.getElementById("key")
    .value;

    const res =
    await fetch(`${api}/check/${key}`);

    const data =
    await res.json();

    if(data.success){

        document.getElementById("result")
        .innerHTML =
        "✅ Key hợp lệ";

    }else{

        document.getElementById("result")
        .innerHTML =
        "❌ Key không hợp lệ";
    }
}

</script>

</body>
</html>
