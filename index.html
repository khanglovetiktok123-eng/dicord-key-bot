<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.panel{
    width:100%;
    max-width:450px;
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
    font-size:45px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

/* BAN KEY */

.ban{
    background:black;
    color:white;
}

.ban:hover{
    background:#222;
}

/* DELETE KEY */

.delete{
    background:red;
    color:white;
}

.delete:hover{
    background:#cc0000;
}

/* CREATE KEY */

.create{
    background:#00cc66;
    color:white;
}

.create:hover{
    background:#00aa55;
}

/* CHECK KEY */

.check{
    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    );
    color:white;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    min-height:60px;
}

.key{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="panel">

<h1>discord system</h1>

<input type="text" id="key" placeholder="Nhập key">

<button class="ban" onclick="banKey()">
BAN KEY
</button>

<button class="delete" onclick="deleteKey()">
DELETE KEY
</button>

<button class="create" onclick="createKey()">
CREATE KEY
</button>

<button class="check" onclick="checkKey()">
CHECK KEY
</button>

<div class="result" id="result">
Danh sách key sẽ hiện ở đây
</div>

</div>

<script>

const api = "https://discord-key-bot.onrender.com";

async function createKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/create/${key}`);

    const data = await res.json();

    document.getElementById("result").innerHTML =
    "✅ Tạo key thành công: " + key;
}

async function deleteKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/delete/${key}`);

    const data = await res.json();

    document.getElementById("result").innerHTML =
    "🗑️ Đã xóa key: " + key;
}

async function banKey(){

    const key = document.getElementById("key").value;

    document.getElementById("result").innerHTML =
    "⛔ Đã ban key: " + key;
}

async function checkKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/check/${key}`);

    const data = await res.json();

    if(data.success){

        document.getElementById("result").innerHTML =
        "✅ Key hợp lệ";

    }else{

        document.getElementById("result").innerHTML =
        "❌ Key không hợp lệ";

    }
}

</script>

</body>
</html>
