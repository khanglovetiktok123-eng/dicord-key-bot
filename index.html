<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.panel{
    width:100%;
    max-width:500px;
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}

.key{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>
<script>
const api = "https://discord-key-bot.onrender.com";

async function createKey() {
    let key = document.querySelector("input").value;

    let res = await fetch(`${api}/create/${key}`);
    let data = await res.json();

    alert(data.message || "Tạo key thành công");
}

async function checkKey() {
    let key = document.querySelector("input").value;

    let res = await fetch(`${api}/check/${key}`);
    let data = await res.json();

    alert(data.message);
}

document.querySelectorAll("button")[0].onclick = createKey;
document.querySelectorAll("button")[3].onclick = checkKey;
</script>
<body>

<div class="panel">

<h1>discord system</h1>

<input type="text" id="key" placeholder="Nhập key">

<button onclick="createKey()">CREATE KEY</button>
<button onclick="deleteKey()">DELETE KEY</button>
<button onclick="banKey()">BAN KEY</button>
<button onclick="checkKey()">CHECK KEY</button>

<div class="result" id="result">
Danh sách key sẽ hiện ở đây
</div>

</div>

<script>

async function createKey(){

    const key = document.getElementById("key").value;

    const res = await fetch("/create-key",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({key})
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
    "✅ " + data.message;
}

async function deleteKey(){

    const key = document.getElementById("key").value;

    const res = await fetch("/delete-key",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({key})
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
    "🗑️ " + data.message;
}

async function banKey(){

    const key = document.getElementById("key").value;

    const res = await fetch("/ban-key",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({key})
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
    "⛔ " + data.message;
}

async function checkKey(){

    const res = await fetch("/check-key");

    const data = await res.json();

    let html = "";

    data.keys.forEach(k=>{
        html += `<div class="key">${k}</div>`;
    });

    document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
