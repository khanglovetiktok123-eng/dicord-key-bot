<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>@khangloveios</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#08122b;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* VIỀN 7 MÀU */

.rainbow-border{
    padding:4px;
    border-radius:28px;

    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );

    background-size:400% 400%;

    animation:rainbowMove 3s linear infinite;

    box-shadow:
    0 0 25px rgba(255,255,255,0.15),
    0 0 50px rgba(0,0,0,0.6);
}

@keyframes rainbowMove{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:400% 50%;
    }

}

/* LOGIN */

#loginPage{
    display:block;
}

.login-box{
    width:340px;
    background:#050505;
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
}

.title{
    color:white;
    font-size:30px;
    font-weight:bold;
    margin-bottom:28px;
}

input{
    width:100%;
    height:55px;

    border:none;
    outline:none;

    border-radius:15px;

    background:#1b2946;

    color:white;

    font-size:18px;

    padding:0 15px;

    margin-bottom:18px;
}

input::placeholder{
    color:#8f9bb3;
}

button{
    width:100%;
    height:55px;

    border:none;
    border-radius:15px;

    color:white;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    margin-top:10px;

    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.login-btn{
    background:#003cff;
}

/* PANEL */

#panel{
    display:none;
}

.panel-box{
    width:380px;
    background:#050505;
    border-radius:25px;
    padding:30px;
    text-align:center;
}

.panel-title{
    color:white;
    font-size:34px;
    margin-bottom:25px;
}

/* BUTTON PANEL */

.create{
    background:#00c853;
}

.delete{
    background:#ff1744;
}

.check{
    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    );
}

/* RESULT */

#result{
    margin-top:20px;

    background:#111827;

    border-radius:15px;

    padding:15px;

    color:white;
    font-size:18px;
    font-weight:bold;
}

#status{
    margin-top:18px;
    color:#bdbdbd;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="rainbow-border">

<div class="login-box">

<div class="title">
@khangloveios
</div>

<input
type="text"
id="adminKey"
placeholder="">

<button
type="button"
class="login-btn"
onclick="login()">

ĐĂNG NHẬP

</button>

<div id="status">
Waiting...
</div>

</div>
</div>
</div>

<!-- PANEL -->

<div id="panel">

<div class="rainbow-border">

<div class="panel-box">

<div class="panel-title">
DISCORD SYSTEM
</div>

<input
type="text"
id="key"
placeholder="Nhập key">

<button
class="create"
onclick="createKey()">

CREATE KEY

</button>

<button
class="delete"
onclick="deleteKey()">

DELETE KEY

</button>

<button
class="check"
onclick="checkKey()">

CHECK KEY

</button>

<div id="result">
Kết quả sẽ hiện ở đây
</div>

</div>
</div>
</div>

<script>

const api =
"https://dicord-key-bot.onrender.com";

/* LOGIN */

function login(){

    let input =
    document.getElementById("adminKey")
    .value
    .trim()
    .toLowerCase();

    if(input === "nhat khang"){

        document.getElementById("status")
        .innerHTML =
        "<span style='color:#00ff66;'>✅ Đăng nhập thành công</span>";

        setTimeout(()=>{

            document.getElementById("loginPage")
            .style.display = "none";

            document.getElementById("panel")
            .style.display = "block";

        },1000);

    }else{

        document.getElementById("status")
        .innerHTML =
        "<span style='color:red;'>❌ Sai key admin</span>";

    }

}

/* CREATE KEY */

async function createKey(){

    const key =
    document.getElementById("key")
    .value;

    await fetch(`${api}/create/${key}`);

    document.getElementById("result")
    .innerHTML =
    "✅ Đã tạo key: " + key;
}

/* DELETE KEY */

async function deleteKey(){

    const key =
    document.getElementById("key")
    .value;

    await fetch(`${api}/delete/${key}`);

    document.getElementById("result")
    .innerHTML =
    "🗑️ Đã xóa key: " + key;
}

/* CHECK KEY */

async function checkKey(){

    const key =
    document.getElementById("key")
    .value;

    const res =
    await fetch(`${api}/check/${key}`);

    const data =
    await res.json();

    if(data.success){

        document.getElementById("result")
        .innerHTML =
        "✅ Key hợp lệ";

    }else{

        document.getElementById("result")
        .innerHTML =
        "❌ Key không hợp lệ";

    }

}

</script>

</body>
</html>
