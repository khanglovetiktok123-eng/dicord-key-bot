<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nhat Khang System</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none; }
        .wrapper { width: 100%; max-width: 350px; padding: 20px; }
        
        /* Giao diện chung */
        .box { background: #111; padding: 30px; border-radius: 30px; color: white; text-align: center; }
        
        /* Input & Toggle */
        .input-group { position: relative; margin: 20px 0; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
        
        #toggleBtn { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
            cursor: pointer; color: #888; font-size: 0.9rem; font-weight: 600;
        }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .key-item { background: #222; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div id="screen1" class="wrapper">
        <div class="box">
            <img src="https://hanaminikata.com/image/1502088830084190238/e4e0f0b6f6e73a75.webp" style="width:80px; height:80px; border-radius:50%; margin-bottom:15px; border:2px solid #333;">
            <h3>nhat khang ios</h3>
            <button class="btn" style="background:#c0130c;" onclick="showScreen(2)">TIẾP TỤC</button>
        </div>
    </div>

    <div id="screen2" class="wrapper hidden">
        <div class="box">
            <h3>LOGIN</h3>
            <div class="input-group">
                <input type="password" id="passwordField" placeholder="Mật khẩu...">
                <span id="toggleBtn" onclick="togglePassword()">Hiện</span>
            </div>
            <button class="btn" style="background:#c0130c;" onclick="checkPassword()">XÁC NHẬN</button>
            <div id="loginMessage" style="margin-top: 15px; height: 20px; font-weight: bold;"></div>
        </div>
    </div>

    <div id="screen3" class="wrapper hidden">
        <div class="box">
            <h3>Quản lý Key</h3>
            <input type="text" id="keyName" placeholder="Tên key...">
            <select id="keyType" style="margin: 10px 0;">
                <option value="DAYS">DAYS</option>
                <option value="MONTH">MONTH</option>
                <option value="FOREVER">FOREVER</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <button class="btn" onclick="createKey()" style="background:#2E7D32; margin-top:0">Tạo</button>
                <button class="btn" onclick="deleteKey()" style="background:#FF0000; margin-top:0">Xoá</button>
                <button class="btn" onclick="checkKey()" style="background:#007aff; margin-top:0">Check</button>
            </div>
            <ul id="keyList" style="list-style: none; padding: 0; margin-top:20px;"></ul>
        </div>
    </div>

    <script>
      
       function showScreen(num) {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen' + num).classList.remove('hidden');
        }

        function togglePassword() {
            const f = document.getElementById("passwordField");
            const t = document.getElementById("toggleBtn");
            if (f.type === "password") { f.type = "text"; t.innerText = "Ẩn"; }
            else { f.type = "password"; t.innerText = "Hiện"; }
        }

        function checkPassword() {
            const pass = document.getElementById("passwordField").value;
            const msg = document.getElementById("loginMessage");
            if(pass === "nhat khang") {
                msg.style.color = "#4CAF50";
                msg.innerText = "Đăng nhập thành công";
                setTimeout(() => { showScreen(3); renderKeys(); }, 800);
            } else {
                msg.style.color = "#FF0000";
                msg.innerText = "Đăng nhập thất bại";
            }
        }

        // Logic Key
        async function renderKeys() {

    const res = await fetch(
        "https://dicord-key-bot.onrender.com/keys"
    );

    const keys = await res.json();

    document.getElementById('keyList').innerHTML =
    keys.map(k =>
        `<li class="key-item">
            <strong>${k.key}</strong>
        </li>`
    ).join('');
}
        async function createKey(){

    const name =
    document.getElementById("keyName").value;

    await fetch(
        `https://dicord-key-bot.onrender.com/create/${name}`
    );

    renderKeys();
}
        async function deleteKey(){

    const name =
    document.getElementById("keyName").value;

    await fetch(
        `https://dicord-key-bot.onrender.com/delete/${name}`
    );

    renderKeys();
}
        async function checkKey() {

    const name =
    document.getElementById("keyName").value.trim();

    if (!name) {
        alert("nhập key");
        return;
    }

    const res = await fetch(
        `https://dicord-key-bot.onrender.com/check/${encodeURIComponent(name)}`
    );

    const data = await res.json();

    if (data.success) {

        alert("key tồn tại");

    } else {

        alert("key không tồn tại");

    }
}
    </script>
</body>
</html>
