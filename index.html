<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Key System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.panel{
    width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* BAN */

.ban{
    background:black;
    color:white;
}

/* DELETE */

.delete{
    background:red;
    color:white;
}

/* CREATE */

.create{
    background:#00cc66;
    color:white;
}

/* CHECK */

.check{
    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    );
    color:white;
}

#result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}

</style>
</head>

<body>

<div class="panel">

<h1>Discord System</h1>

<input type="text" id="key" placeholder="Nhập key">

<button class="ban" onclick="banKey()">
BAN KEY
</button>

<button class="delete" onclick="deleteKey()">
DELETE KEY
</button>

<button class="create" onclick="createKey()">
CREATE KEY
</button>

<button class="check" onclick="checkKey()">
CHECK KEY
</button>

<div id="result">
Kết quả sẽ hiện ở đây
</div>

</div>

<script>

const api = "https://discord-key-bot.onrender.com";

/* CREATE */

async function createKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/create/${key}`);

    const data = await res.json();

    document.getElementById("result").innerHTML =
    data.message;
}

/* DELETE */

async function deleteKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/delete/${key}`);

    const data = await res.json();

    document.getElementById("result").innerHTML =
    data.message;
}

/* BAN */

async function banKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/ban/${key}`);

    const data = await res.json();

    document.getElementById("result").innerHTML =
    data.message;
}

/* CHECK */

async function checkKey(){

    const key = document.getElementById("key").value;

    const res = await fetch(`${api}/check/${key}`);

    const data = await res.json();

    document.getElementById("result").innerHTML =
    data.message;
}

</script>

</body>
</html>
